name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger from the Actions tab on GitHub

jobs:
  sync:
    name: Sync with Upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to origin

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # Fetch all history for merging

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/Sameer200506/merge-2.git || true

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream/main
        run: |
          git merge upstream/main -m "auto-merge: sync with upstream/main" --allow-unrelated-histories

      - name: Push changes
        run: git push origin main
